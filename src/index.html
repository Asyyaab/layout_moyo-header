<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    <title>Moyo header</title>

    <link
      rel="stylesheet"
      href="./style.css"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="header__container">
          <div class="header__logo">
            <a
              href="#"
              class="header__logo-link"
            >
              <img
                src="images/logo.png"
                alt="MOYO logo"
              />
            </a>
          </div>

          <nav class="header__menu">
            <ul class="menu__list">
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link is-active"
                >
                  APPLE
                </a>
              </li>
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link link2"
                >
                  SAMSUNG
                </a>
              </li>
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link link3"
                >
                  SMARTPHONES
                </a>
              </li>
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link link4"
                  data-qa="hover"
                >
                  LAPTOPS & COMPUTERS
                </a>
              </li>
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link link5"
                >
                  GADGETS
                </a>
              </li>
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link link6"
                >
                  TABLETS
                </a>
              </li>
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link link7"
                >
                  PHOTO
                </a>
              </li>
              <li class="menu__item">
                <a
                  href="#"
                  class="menu__link link8"
                >
                  VIDEO
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </header>
    </div>
  </body>
</html>
